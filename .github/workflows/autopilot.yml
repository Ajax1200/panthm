name: PANTHM Autopilot Blogging

on:
  schedule:
    # Trigger runs once daily at 4:00 AM UTC (9:30 AM IST)
    - cron: '0 4 * * *'
  workflow_dispatch: # Enable running manual workflow executions from GitHub UI

jobs:
  run-autopilot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Run Autopilot blogging engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SITEMAP_PATH: 'public/sitemap.xml'
          GITHUB_BRANCH: 'main'
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_MEMBER_ID: ${{ secrets.LINKEDIN_MEMBER_ID }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_MAKE_WEBHOOK_URL: ${{ secrets.LINKEDIN_MAKE_WEBHOOK_URL }}
        run: |
          node automation/autopilot.js
