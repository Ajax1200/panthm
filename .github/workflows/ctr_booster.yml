name: PANTHM CTR Booster

on:
  schedule:
    # Trigger runs every 30 minutes (~48 times per day)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Enable manual run from GitHub Actions UI

# Prevent duplicate concurrent executions
concurrency:
  group: ctr-booster
  cancel-in-progress: true

jobs:
  run-booster:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install

      - name: Run organic search simulation
        run: |
          node ctr_booster.js
